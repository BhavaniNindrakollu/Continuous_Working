  <style>
    div {
      color: black;
      text-align: center;

    button:hover{
        color: blanchedalmond;
        background-color: black;
        transform: scale(1);
    }
  </style>
  <body>
    <br /><br /><br /><br /><br />

      <br />

        <h3 id="three">LOAD SOME CONTENT</h3>
      </button>
